name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      MONGO_URL: ${{ secrets.MONGO_URL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        id: pnpm-install
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Looks like to use pnpm cache, setup-node must run after pnpm/action-setup
      # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Confirm pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install

      # root task
      # https://turborepo.dev/docs/guides/tools/oxc#create-root-tasks-1
      - name: Format
        run: pnpm exec turbo format:check

      - name: Lint
        run: pnpm lint:check

      # Standard linux runners for public repositories have 4 vCPUs and 16GB of RAM
      # see: https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
      - name: Test
        run: pnpm test:ci

      # TODO: Re-enable build in a dedicated CI build cleanup PR. The current
      # build surface needs app-scoped env isolation for Payload/Next apps.
      - name: Build
        if: ${{ false }}
        run: pnpm build

      # TODO: Re-enable Playwright browser installation with the Playwright check below.
      - name: Install Playwright browsers
        if: ${{ false }}
        run: npx playwright install --with-deps

      # TODO: Re-enable Playwright in a dedicated E2E cleanup PR. The current
      # Playwright surface has stale app-level configs for apps with no specs.
      - name: Playwright
        if: ${{ false }}
        run: pnpm playwright
