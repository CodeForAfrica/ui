name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize]

# This allows a subsequently queued workflow run to interrupt previous runs
concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      MONGO_URL: ${{ secrets.MONGO_URL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      NEXT_TELEMETRY_DISABLED: 1
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      # PesaYetu specific environment variables
      HURUMAP_API_URL: ${{ secrets.PESAYETU_HURUMAP_API_URL }}
      JWT_SECRET_KEY: ${{ secrets.PESAYETU_JWT_SECRET_KEY }}
      WORDPRESS_APPLICATION_USERNAME: ${{ secrets.PESAYETU_WORDPRESS_APPLICATION_USERNAME }}
      WORDPRESS_APPLICATION_PASSWORD: ${{ secrets.PESAYETU_WORDPRESS_APPLICATION_PASSWORD }}
      WORDPRESS_MULTISITE_PREFIX: ${{ secrets.PESAYETU_WORDPRESS_MULTISITE_PREFIX }}
      WORDPRESS_PREVIEW_SECRET: ${{ secrets.PESAYETU_WORDPRESS_PREVIEW_SECRET }}
      WORDPRESS_URL: ${{ secrets.PESAYETU_WORDPRESS_URL }}
      # TwoopsTracker specific environment variables
      TWOOPSTRACKER_API_URL: "https://dev.investigate.africa/v1"
    strategy:
      matrix:
        node-version: [24]
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # https://github.com/pnpm/action-setup#use-cache-to-reduce-installation-time
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        id: pnpm-install
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Looks like to use pnpm cache, setup-node must run after pnpm/action-setup
      # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Confirm pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint:check

      # Standard linux runners for public repositories have 4 vCPUs and 16GB of RAM
      # see: https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
      - name: Jest
        run: pnpm jest:ci

      # TODO: Re-enable PesaYetu once its external HURUmap API no longer
      # intermittently returns non-JSON responses during static prerendering.
      - name: Build
        run: pnpm exec turbo run build --filter=!pesayetu

      - name: Playwright
        run: pnpm exec turbo run playwright --filter=!pesayetu
