name: Reusable | Bake and Push

permissions:
  contents: read
  actions: read

# Reusable workflow for building and optionally pushing a bake target.
# Replaces build-docker-image.yml for apps migrated to docker-bake.hcl.
#
# Callers pass app-specific build args via the `set` input using GitHub Variables
# i.e. public config that is safe to expose in workflow logs. Secrets that
# are genuinely needed at build time (e.g. Sentry source map upload credentials,
# DB access if the framework initialises at build) are declared explicitly below.
# Everything else (APP_URL, SMTP_PASS, PAYLOAD_CORS, etc.) belongs in runtime
# config (e.g. Dokku config:set) and should never be passed here.

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Bake target name (e.g. techlabblog)"
      target_os:
        required: true
        type: string
        description: >
          JSON string passed to runs-on via fromJSON, e.g.
          ["ubuntu-24.04-arm"].
      tag:
        required: true
        type: string
        description: "Image tag to build or push (e.g. git SHA or semver)"
      push:
        required: false
        type: boolean
        default: true
        description: "Whether to push the built image to the registry"
      base_tag:
        required: false
        type: string
        default: ""
        description: >
          Pre-built base image tag (BASE_TAG). When set, pulls ui-builder-base
          and ui-runner-base from the registry instead of building them inline.
          Required for CI app builds so they reuse published base images rather
          than rebuilding base images inline.
      set:
        required: false
        type: string
        default: ""
        description: >
          Extra bake --set overrides (newline-separated target.field=value pairs).
          Use this to inject app-specific build args. See
          https://docs.docker.com/reference/cli/docker/buildx/bake/#set
          Note: GitHub Variables are available here; secrets are not. Pass
                truly secret build args via the declared secrets inputs below.
    # Mark required: false so apps without optional secrets can use this workflow.
    secrets:
      DATABASE_URL:
        required: false
      DOCKER_HUB_USERNAME:
        required: false
      DOCKER_HUB_ACCESS_TOKEN:
        required: false
      PAYLOAD_SECRET:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false

jobs:
  bake:
    runs-on: ${{ fromJSON(inputs.target_os) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Validate base image tag
        if: ${{ inputs.base_tag == '' }}
        run: |
          echo "::error::base_tag is required for CI app builds. Build and publish base images, then set vars.UI_BASE_TAG."
          exit 1

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: ${{ inputs.push }}
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build with Docker bake
        uses: docker/bake-action@v7
        env:
          TAG: ${{ inputs.tag }}
          BASE_TAG: ${{ inputs.base_tag }}
          GIT_REVISION: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          files: docker-bake.hcl
          targets: ${{ inputs.target }}
          push: ${{ inputs.push }}
          set: |
            *.cache-from=type=gha,scope=${{ inputs.target }}
            *.cache-to=type=gha,mode=max,scope=${{ inputs.target }}
            ${{ inputs.set }}
