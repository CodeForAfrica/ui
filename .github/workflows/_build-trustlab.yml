name: Reusable Build | TrustLab

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: "Image tag to build or push"
      push:
        required: true
        type: boolean
        description: "Whether to push the built image to the registry"
      base_tag:
        required: true
        type: string
        description: "Published base image tag to build from"
      set:
        required: false
        type: string
        default: ""
        description: "Additional bake --set overrides"
    secrets:
      DATABASE_URL:
        required: false
      DOCKER_HUB_USERNAME:
        required: false
      DOCKER_HUB_ACCESS_TOKEN:
        required: false
      PAYLOAD_SECRET:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false

jobs:
  build:
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/_bake-and-push.yml
    with:
      target: trustlab
      target_os: '["ubuntu-24.04-arm"]'
      base_tag: ${{ inputs.base_tag }}
      tag: ${{ inputs.tag }}
      push: ${{ inputs.push }}
      set: ${{ inputs.set }}
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
