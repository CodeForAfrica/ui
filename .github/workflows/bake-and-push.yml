name: Bake and Push

permissions:
  contents: read
  actions: read

# Reusable workflow for building and pushing a bake target.
# Replaces build-docker-image.yml for apps migrated to docker-bake.hcl.
#
# Callers pass app-specific build args via the `set` input using GitHub Variables
# i.e. public config that is safe to expose in workflow logs. Secrets that
# are genuinely needed at build time (e.g. Sentry source map upload credentials,
# DB access if the framework initialises at build) are declared explicitly below.
# Everything else (APP_URL, SMTP_PASS, PAYLOAD_CORS, etc.) belongs in runtime
# config (e.g. Dokku config:set) and should never be passed here.

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Bake target name (e.g. techlabblog)"
      tag:
        required: true
        type: string
        description: "Image tag to push (e.g. git SHA or semver)"
      base_tag:
        required: false
        type: string
        default: ""
        description: >
          Pre-built base image tag (BASE_TAG). When set, pulls ui-builder-base
          and ui-runner-base from the registry instead of building them inline.
          Use this in CI to avoid rebuilding base images on every app push.
          Omit (or leave empty) to build base images inline — useful when
          testing base image changes locally via act or in build-base-images.yml.
      platforms:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
        description: "Target platforms (comma-separated). Override to build for a single platform."
      set:
        required: false
        type: string
        default: ""
        description: >
          Extra bake --set overrides (newline-separated target.field=value pairs).
          Use this to inject app-specific build args. See
          https://docs.docker.com/reference/cli/docker/buildx/bake/#set
          Note: GitHub Variables are available here; secrets are not. Pass
                truly secret build args via the declared secrets inputs below.
    # Mark required: false so apps without optional secrets can use this workflow.
    secrets:
      DATABASE_URL:
        required: false
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true
      PAYLOAD_SECRET:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build metadata
        id: meta
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/bake-action@v6
        env:
          TAG: ${{ inputs.tag }}
          BASE_TAG: ${{ inputs.base_tag }}
          GIT_REVISION: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.date }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          files: docker-bake.hcl
          targets: ${{ inputs.target }}
          push: true
          set: |
            *.cache-from=type=gha,scope=${{ inputs.target }}
            *.cache-to=type=gha,mode=max,scope=${{ inputs.target }}
            *.platform=${{ inputs.platforms }}
            ${{ inputs.set }}
